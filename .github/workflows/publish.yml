name: Publish to PyPI

# Trigger: pushing a vX.Y.Z tag to this repo. The tag is the release
# button — everything below is automated. To retry a failed run, fix the
# cause and re-run it (gh run rerun) — the tag ref is preserved.
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no token is stored
# anywhere. The publisher must be registered once on PyPI:
#   project `declaw` → Publishing → GitHub → declaw-ai / declaw-python /
#   publish.yml

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # PyPI trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(grep -m1 '^version' pyproject.toml | sed 's/[^"]*"\([^"]*\)".*/\1/')
          if [ "$TAG" != "$VER" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${VER} — refusing to publish"
            exit 1
          fi
          if ! grep -q "^## \[${TAG}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no [${TAG}] section (still [Unreleased]?) — rename it, re-sync, re-tag. Refusing to publish."
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry + dependencies
        run: |
          pipx install poetry
          poetry install

      - name: Test
        run: poetry run pytest tests/

      - name: Build
        run: |
          poetry build
          ls -lh dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v ver="$VER" '
            $0 ~ "^## \\[" ver "\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > /tmp/notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "declaw $GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md
